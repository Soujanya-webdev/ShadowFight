
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Brutalist Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Brutalist tweaks */
        body { 
            background-color: #f4f4f0; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .brutalist-card {
            border: 2px solid #000;
            background: white;
        }
        .category-food { background-color: #ff6b35; }
        .category-transport { background-color: #4ecdc4; }
        .category-entertainment { background-color: #45b7d1; }
        .category-shopping { background-color: #f9ca24; }
        .category-income { background-color: #2ecc71; }
        .title-input:focus, .amount-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px #000;
        }
    </style>
</head>
<body class="min-h-screen py-12 px-4">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold text-black mb-2 tracking-tight">EXPENSE TRACKER</h1>
            <div class="w-24 h-1 bg-black mx-auto"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Summary Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="brutalist-card p-6 text-center">
                    <h3 class="text-lg font-bold text-black uppercase tracking-wide mb-2">Total Income</h3>
                    <div class="text-3xl font-black text-black" id="totalIncome">$0.00</div>
                </div>
                <div class="brutalist-card p-6 text-center">
                    <h3 class="text-lg font-bold text-black uppercase tracking-wide mb-2">Total Expense</h3>
                    <div class="text-3xl font-black text-red-600" id="totalExpense">$0.00</div>
                </div>
                <div class="brutalist-card p-6 text-center">
                    <h3 class="text-lg font-bold text-black uppercase tracking-wide mb-2">Balance</h3>
                    <div class="text-3xl font-black text-green-600" id="balance">$0.00</div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            <!-- Add Transaction Form -->
            <div class="brutalist-card p-8 lg:col-span-1">
                <h2 class="text-2xl font-bold text-black mb-6 uppercase tracking-wide">Add Transaction</h2>
                <form id="transactionForm" class="space-y-4">
                    <div>
                        <label class="block text-lg font-bold text-black mb-2">Title</label>
                        <input type="text" id="title" required 
                               class="w-full p-4 border-2 border-black title-input font-bold text-lg tracking-wide uppercase"
                               placeholder="GROCERIES">
                    </div>
                    <div>
                        <label class="block text-lg font-bold text-black mb-2">Amount</label>
                        <input type="number" id="amount" step="0.01" min="0" required
                               class="w-full p-4 border-2 border-black amount-input font-bold text-lg text-right"
                               placeholder="0.00">
                    </div>
                    <div>
                        <label class="block text-lg font-bold text-black mb-2">Category</label>
                        <select id="category" class="w-full p-4 border-2 border-black font-bold text-lg">
                            <option value="food" class="category-food">🍽️ Food</option>
                            <option value="transport" class="category-transport">🚗 Transport</option>
                            <option value="entertainment" class="category-entertainment">🎬 Entertainment</option>
                            <option value="shopping" class="category-shopping">🛒 Shopping</option>
                            <option value="income" class="category-income">💰 Income</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-lg font-bold text-black mb-2">Type</label>
                        <select id="type" class="w-full p-4 border-2 border-black font-bold text-lg">
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                    <button type="submit" 
                            class="w-full bg-black text-white py-4 px-8 text-xl font-bold uppercase tracking-wider hover:bg-gray-800 transition-all">
                        Add Transaction
                    </button>
                </form>
            </div>

            <!-- Chart -->
            <div class="brutalist-card p-8">
                <h2 class="text-2xl font-bold text-black mb-6 uppercase tracking-wide text-center">Category Breakdown</h2>
                <div class="w-full h-80">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Transaction Ledger -->
        <div class="brutalist-card p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-black uppercase tracking-wide">Transaction Ledger</h2>
                <button id="clearAllBtn" class="bg-red-600 text-white px-6 py-2 font-bold uppercase tracking-wide border-2 border-red-600 hover:bg-red-700">
                    Clear All
                </button>
            </div>
            <div id="transactionList" class="space-y-4 max-h-96 overflow-y-auto">
                <!-- Transactions will be populated here -->
            </div>
        </div>
    </div>

 <script src="script.js"></script>
</body>
</html>
